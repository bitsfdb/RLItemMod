name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: build python sidecar
        run: |
          pip install pyinstaller cryptography
          mkdir -p src-tauri/bin
          pyinstaller --onefile --distpath src-tauri/bin --name velocity-engine-x86_64-pc-windows-msvc python/rl_asset_swapper.py

      - name: install frontend dependencies
        run: npm install

      - name: build tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action will replace this with the version from package.json
          releaseName: "VelocityRL v__VERSION__"
          releaseBody: "Automated Release with SHA256 Integrity Verification."
          releaseDraft: true
          prerelease: false

      - name: generate sha256 checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path src-tauri/target/release/bundle/msi/*.msi, src-tauri/target/release/bundle/nsis/*.exe
          foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            Set-Content -Path "$($file.FullName).sha256" -Value $hash
          }
          $engine = Get-Item "src-tauri/bin/velocity-engine-x86_64-pc-windows-msvc.exe"
          $engineHash = (Get-FileHash -Path $engine.FullName -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "python/engine.sha256" -Value $engineHash

      - name: upload checksums to release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.sha256
            src-tauri/target/release/bundle/nsis/*.sha256
            python/engine.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
